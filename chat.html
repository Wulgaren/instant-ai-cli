<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --accent: #3b82f6;
      --danger: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 1rem 1rem 7.5rem;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 85%;
      padding: 0.65rem 0.85rem;
      border-radius: 12px;
      margin-bottom: 0.75rem;
      line-height: 1.45;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
    }

    .bubble.assistant {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .composer-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0.75rem 1rem 1rem;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      pointer-events: none;
    }

    .composer-wrap .composer {
      pointer-events: auto;
    }

    .composer {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.65rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.35);
    }

    .row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
    }

    textarea {
      flex: 1;
      min-height: 44px;
      max-height: 160px;
      resize: vertical;
      padding: 0.55rem 0.65rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
      line-height: 1.4;
    }

    textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    button {
      font: inherit;
      cursor: pointer;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 0.45rem 0.85rem;
      background: var(--bg);
      color: var(--text);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    button.danger {
      border-color: rgba(248, 113, 113, 0.45);
      color: var(--danger);
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    .spinner.visible {
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .clear-group {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 520px) {
      .messages {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="messages" id="messages" aria-live="polite"></div>
  </div>

  <div class="composer-wrap">
    <form class="composer" id="form" autocomplete="off">
      <div class="row">
        <label for="input" class="visually-hidden">Message</label>
        <textarea
          id="input"
          name="message"
          rows="2"
          placeholder="Type a message…"
          required
        ></textarea>
      </div>
      <div class="toolbar">
        <div class="clear-group">
          <span class="spinner" id="submitSpinner" aria-hidden="true"></span>
          <button type="button" class="danger" id="clearBtn">Clear chat</button>
        </div>
        <button type="submit" class="primary" id="submitBtn">Submit</button>
      </div>
    </form>
  </div>

  <script>
    (function () {
      var messagesEl = document.getElementById("messages");
      var form = document.getElementById("form");
      var input = document.getElementById("input");
      var clearBtn = document.getElementById("clearBtn");
      var submitBtn = document.getElementById("submitBtn");
      var spinner = document.getElementById("submitSpinner");

      function setLoading(loading) {
        spinner.classList.toggle("visible", loading);
        submitBtn.disabled = loading;
        input.disabled = loading;
        clearBtn.disabled = loading;
      }

      function appendBubble(role, text) {
        var div = document.createElement("div");
        div.className = "bubble " + role;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function mockReply(userText) {
        return new Promise(function (resolve) {
          setTimeout(function () {
            resolve(
              "You said: " +
                userText +
                "\n\n(This is a demo reply. Wire your API in chat.html.)"
            );
          }, 1200);
        });
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var text = input.value.trim();
        if (!text) return;

        appendBubble("user", text);
        input.value = "";
        setLoading(true);

        mockReply(text)
          .then(function (reply) {
            appendBubble("assistant", reply);
          })
          .finally(function () {
            setLoading(false);
            input.focus();
          });
      });

      clearBtn.addEventListener("click", function () {
        messagesEl.innerHTML = "";
        input.focus();
      });
    })();
  </script>
</body>
</html>
